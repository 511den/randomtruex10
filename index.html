<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Я обосрался жестоко</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    background:
    radial-gradient(circle at top,#1f1f3d,#090909 70%);
    font-family:'Orbitron',sans-serif;
    color:white;
    overflow-x:hidden;
    padding:40px;
}

/* АНИМИРОВАННЫЙ ФОН */

body::before{
    content:"";
    position:fixed;
    width:200%;
    height:200%;
    top:-50%;
    left:-50%;
    background:
    repeating-radial-gradient(
        circle,
        rgba(0,255,255,0.08) 0px,
        rgba(0,255,255,0.08) 2px,
        transparent 2px,
        transparent 80px
    );
    animation:bgMove 20s linear infinite;
    z-index:-1;
}

@keyframes bgMove{
    0%{
        transform:rotate(0deg);
    }
    100%{
        transform:rotate(360deg);
    }
}

h1{
    text-align:center;
    font-size:50px;
    margin-bottom:40px;
    color:#00ffff;
    text-shadow:
    0 0 10px #00ffff,
    0 0 20px #00ffff,
    0 0 40px #00ffff;
    animation:glow 2s infinite alternate;
}

@keyframes glow{
    from{
        text-shadow:
        0 0 10px #00ffff,
        0 0 20px #00ffff;
    }
    to{
        text-shadow:
        0 0 20px #00ffff,
        0 0 40px #00ffff,
        0 0 80px #00ffff;
    }
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:30px;
}

.generator{
    position:relative;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(12px);
    border-radius:25px;
    padding:25px;
    overflow:hidden;
    transition:0.4s;
    animation:fadeIn 1s ease;
}

.generator:hover{
    transform:translateY(-10px) scale(1.02);
    box-shadow:
    0 0 20px rgba(0,255,255,0.3),
    0 0 60px rgba(0,255,255,0.2);
}

.generator::before{
    content:"";
    position:absolute;
    width:150%;
    height:150%;
    background:linear-gradient(
        45deg,
        transparent,
        rgba(0,255,255,0.2),
        transparent
    );
    top:-50%;
    left:-50%;
    transform:rotate(25deg);
    animation:shine 5s linear infinite;
}

@keyframes shine{
    0%{
        transform:translateX(-100%) rotate(25deg);
    }
    100%{
        transform:translateX(100%) rotate(25deg);
    }
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

h2{
    margin-bottom:15px;
    color:#00ffff;
}

textarea{
    width:100%;
    height:130px;
    background:rgba(0,0,0,0.4);
    border:1px solid rgba(0,255,255,0.2);
    border-radius:15px;
    padding:15px;
    color:white;
    font-size:15px;
    resize:none;
    outline:none;
    transition:0.3s;
}

textarea:focus{
    border-color:#00ffff;
    box-shadow:
    0 0 10px rgba(0,255,255,0.5);
}

button{
    width:100%;
    margin-top:15px;
    padding:15px;
    border:none;
    border-radius:15px;
    background:linear-gradient(45deg,#00ffff,#0088ff);
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
    position:relative;
    overflow:hidden;
}

button:hover{
    transform:scale(1.03);
    box-shadow:
    0 0 20px rgba(0,255,255,0.6);
}

button:active{
    transform:scale(0.96);
}

.result{
    margin-top:20px;
    background:rgba(0,0,0,0.5);
    border-radius:15px;
    min-height:70px;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    padding:20px;
    border:1px solid rgba(0,255,255,0.15);
    transition:0.3s;
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%{
        box-shadow:0 0 0 rgba(0,255,255,0);
    }
    50%{
        box-shadow:0 0 20px rgba(0,255,255,0.2);
    }
    100%{
        box-shadow:0 0 0 rgba(0,255,255,0);
    }
}

.word-animation{
    animation:pop 0.5s ease;
}

@keyframes pop{
    0%{
        transform:scale(0.5);
        opacity:0;
    }
    100%{
        transform:scale(1);
        opacity:1;
    }
}

</style>
</head>

<body>

<h1>Это типо рандом генераторы братан</h1>

<div class="grid" id="grid"></div>

<script>

const grid = document.getElementById("grid");

for(let i = 1; i <= 10; i++){

    const block = document.createElement("div");
    block.className = "generator";

    block.innerHTML = `
        <h2>ГЕНЕРАТОР ${i}</h2>

        <textarea placeholder="Введи слова через Enter
например:
fire
ice
storm
dragon"></textarea>

        <button>⚡ СГЕНЕРИРОВАТЬ ⚡</button>

        <div class="result">...</div>
    `;

    const textarea = block.querySelector("textarea");
    const button = block.querySelector("button");
    const result = block.querySelector(".result");

    button.onclick = () => {

        let words = textarea.value
            .split("\n")
            .map(w => w.trim())
            .filter(w => w.length > 0);

        if(words.length < 2){
            result.innerHTML = "❌ НУЖНО МИНИМУМ 2 СЛОВА";
            return;
        }

        // TRUE RANDOM через crypto
        const randomArray = new Uint32Array(2);
        crypto.getRandomValues(randomArray);

        let first = words[randomArray[0] % words.length];
        let second = words[randomArray[1] % words.length];

        while(second === first && words.length > 1){
            crypto.getRandomValues(randomArray);
            second = words[randomArray[1] % words.length];
        }

        result.innerHTML = `
            <div class="word-animation">
                🔥 ${first}<br><br>
                ⚡ ${second}
            </div>
        `;

        // АНИМАЦИЯ ТРЯСКИ
        block.animate([
            { transform:'translateX(0px)' },
            { transform:'translateX(-5px)' },
            { transform:'translateX(5px)' },
            { transform:'translateX(0px)' }
        ],{
            duration:300
        });

    };

    grid.appendChild(block);
}

</script>

</body>
</html>
